<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CookieWise</title>
  <style>
    /* ── Reset ─────────────────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ── Base ───────────────────────────────────────────── */
    body {
      width: 320px;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      background: #0f1117;
      color: #e2e8f0;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 12px;
      background: linear-gradient(135deg, #1a1f2e 0%, #12161f 100%);
      border-bottom: 1px solid #1e2535;
    }

    header img {
      width: 32px;
      height: 32px;
      border-radius: 6px;
    }

    header h1 {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    header span {
      font-size: 10px;
      font-weight: 500;
      background: #2563eb22;
      color: #60a5fa;
      border: 1px solid #2563eb44;
      padding: 2px 6px;
      border-radius: 20px;
      margin-left: auto;
    }

    /* ── Status card ────────────────────────────────────── */
    .status-card {
      margin: 14px 14px 0;
      border-radius: 12px;
      padding: 16px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      transition: background 0.3s;
    }

    .status-card.found {
      background: linear-gradient(135deg, #3b0f0f 0%, #1f0a0a 100%);
      border: 1px solid #7f1d1d;
    }

    .status-card.clear {
      background: linear-gradient(135deg, #052e16 0%, #051f0f 100%);
      border: 1px solid #14532d;
    }

    .status-card.scanning {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      border: 1px solid #334155;
    }

    .status-icon {
      font-size: 28px;
      line-height: 1;
      flex-shrink: 0;
    }

    .status-text h2 {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 3px;
    }

    .status-text p {
      font-size: 12px;
      color: #94a3b8;
      line-height: 1.5;
    }

    .found .status-text h2 {
      color: #fca5a5;
    }

    .clear .status-text h2 {
      color: #86efac;
    }

    .scanning .status-text h2 {
      color: #93c5fd;
    }

    /* ── Detail rows ────────────────────────────────────── */
    .details {
      margin: 12px 14px 0;
      border-radius: 10px;
      background: #151a27;
      border: 1px solid #1e2535;
      overflow: hidden;
    }

    .detail-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 9px 12px;
      border-bottom: 1px solid #1e2535;
    }

    .detail-row:last-child {
      border-bottom: none;
    }

    .detail-label {
      font-size: 11px;
      color: #64748b;
      min-width: 72px;
      flex-shrink: 0;
      padding-top: 1px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .detail-value {
      font-size: 12px;
      color: #cbd5e1;
      word-break: break-word;
      line-height: 1.4;
    }

    .detail-value.mono {
      font-family: 'Fira Code', 'Cascadia Code', monospace;
      font-size: 11px;
      color: #818cf8;
    }

    .pill {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }

    .pill.method-vendor {
      background: #312e81;
      color: #a5b4fc;
    }

    .pill.method-keyword {
      background: #1c1f4a;
      color: #818cf8;
    }

    .pill.method-multi {
      background: #0c2147;
      color: #7dd3fc;
    }

    /* ── Snippet box ────────────────────────────────────── */
    .snippet {
      margin: 10px 14px 0;
      background: #0d1117;
      border: 1px solid #1e2535;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 11.5px;
      color: #94a3b8;
      font-style: italic;
      line-height: 1.55;
      max-height: 72px;
      overflow-y: auto;
    }

    .snippet-label {
      font-size: 10px;
      text-transform: uppercase;
      color: #475569;
      letter-spacing: 0.5px;
      margin: 12px 14px 4px;
    }

    /* ── Footer ─────────────────────────────────────────── */
    footer {
      margin-top: 14px;
      padding: 10px 16px;
      background: #0a0d14;
      border-top: 1px solid #1e2535;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    footer span {
      font-size: 10.5px;
      color: #475569;
    }

    .dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
    }

    .dot.active {
      background: #22c55e;
      box-shadow: 0 0 4px #22c55e;
    }

    .dot.inactive {
      background: #e53935;
    }

    .dot.idle {
      background: #64748b;
    }

    /* ── Spinner ─────────────────────────────────────────── */
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #334155;
      border-top-color: #60a5fa;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
  </style>
</head>

<body>

  <header>
    <img src="../icons/icon48.png" alt="CookieWise logo" />
    <h1>CookieWise</h1>
    <span>v1.0</span>
  </header>

  <!-- Status card (dynamically updated) -->
  <div class="status-card scanning" id="statusCard">
    <div class="status-icon" id="statusIcon">⏳</div>
    <div class="status-text">
      <h2 id="statusTitle"><span class="spinner"></span> Scanning…</h2>
      <p id="statusDesc">Checking this page for cookie consent banners.</p>
    </div>
  </div>
  <div style="padding:12px">
    <button id="openDashboard" style="
    width:100%;
    padding:10px;
    background:#2563eb;
    border:none;
    color:white;
    border-radius:6px;
    font-weight:600;
    cursor:pointer;">
      View Detailed Analysis
    </button>
  </div>

  <div style="padding:12px; padding-top:0;">
    <button id="openSettings" style="
    width:100%;
    padding:10px;
    background:#475569;
    border:none;
    color:white;
    border-radius:6px;
    font-weight:600;
    cursor:pointer;">
      Default Cookie Settings
    </button>
  </div>

  <!-- Details (hidden until result arrives) -->
  <div class="details" id="detailsBox" style="display:none">
    <div class="detail-row">
      <span class="detail-label">Method</span>
      <span class="detail-value" id="detMethod">—</span>
    </div>
    <div class="detail-row" id="selectorRow" style="display:none">
      <span class="detail-label">Selector</span>
      <span class="detail-value mono" id="detSelector">—</span>
    </div>
    <div class="detail-row" id="hitsRow" style="display:none">
      <span class="detail-label">Keyword hits</span>
      <span class="detail-value" id="detHits">—</span>
    </div>
  </div>

  <!-- Snippet -->
  <div id="snippetSection" style="display:none">
    <div class="snippet-label">Banner text snippet</div>
    <div class="snippet" id="snippetBox"></div>
  </div>

  <footer>
    <span><span class="dot" id="statusDot"></span><span id="footerStatus">Initialising…</span></span>
    <span id="footerTime"></span>
  </footer>

  <script src="../js/popup.js"></script>
</body>

</html>
